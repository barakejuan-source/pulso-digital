name: Actualizar datos

on:
  schedule:
    - cron: '0 */2 * * *'     # cada 2 horas
  workflow_dispatch:            # botón manual en GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias Node
        run: npm install

      - name: Instalar dependencias Python
        run: pip install yt-dlp pysentimiento

      - name: Obtener datos
        run: node scripts/fetch.js

      - name: Guardar datos en el repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/data.json docs/history.json
          git diff --staged --quiet || git commit -m "Datos actualizados $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git main
